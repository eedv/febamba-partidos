name: Scrape FEBAMBA data
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -q -r scraper/requirements.txt
      - name: Run scraper
        run: python scraper/scrape.py
      - name: Commit data
        run: |
          git config user.name "febamba-bot"
          git config user.email "bot@febamba-games"
          git add docs/data/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Actualizar datos $(date +'%d/%m/%Y %H:%M')"
          git push
